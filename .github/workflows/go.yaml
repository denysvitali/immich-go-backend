name: CI Pipeline

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read
  security-events: write  # Required for uploading SARIF results

env:
  GO_VERSION: '1.24'
  BUF_VERSION: '1.49.0'

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Build and unit tests.
  # This is the critical path — everything else can fan out from it.
  # No Nix here: setup-go + buf-action give us everything we need in <30s.
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Install buf
      uses: bufbuild/buf-action@v1
      with:
        # setup_only stops the action from running its default
        # buf build + buf push (which fail for v1 buf.work.yaml).
        setup_only: true
        version: ${{ env.BUF_VERSION }}

    - name: Cache generated protobuf files
      uses: actions/cache@v4
      id: proto-cache
      with:
        path: internal/proto/gen
        key: ${{ runner.os }}-proto-${{ hashFiles('internal/proto/**/*.proto', 'buf.gen.yaml', 'buf.work.yaml', 'internal/proto/buf.yaml') }}
        restore-keys: |
          ${{ runner.os }}-proto-

    - name: Generate Protocol Buffers
      if: steps.proto-cache.outputs.cache-hit != 'true'
      run: |
        rm -rf internal/proto/gen
        buf generate

    - name: Verify generated files exist
      run: |
        if [ ! -d "internal/proto/gen" ] || [ -z "$(ls -A internal/proto/gen)" ]; then
          echo "::error::No protocol buffer files were generated"
          exit 1
        fi
        echo "Generated $(find internal/proto/gen -name '*.go' | wc -l) Go files"

    - name: Build application
      run: go build -o bin/immich-go-backend ./cmd

    - name: Run unit tests
      # Race + integration build tag live in the integration-tests job
      # so this stays fast (~30s on a warm cache).
      run: go test -short -count=1 -timeout=5m ./...

    - name: Upload coverage to Codecov
      continue-on-error: true
      uses: codecov/codecov-action@v5
      with:
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}

  # Job 2: Code Quality and Linting.
  # Runs in parallel with build. No Nix; uses buf-action and setup-go.
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Install buf
      uses: bufbuild/buf-action@v1
      with:
        # setup_only stops the action from running its default
        # buf build + buf push (which fail for v1 buf.work.yaml).
        setup_only: true
        version: ${{ env.BUF_VERSION }}

    - name: Cache generated protobuf files
      uses: actions/cache@v4
      id: proto-cache
      with:
        path: internal/proto/gen
        key: ${{ runner.os }}-proto-${{ hashFiles('internal/proto/**/*.proto', 'buf.gen.yaml', 'buf.work.yaml', 'internal/proto/buf.yaml') }}
        restore-keys: |
          ${{ runner.os }}-proto-

    - name: Generate Protocol Buffers
      if: steps.proto-cache.outputs.cache-hit != 'true'
      run: |
        rm -rf internal/proto/gen
        buf generate

    - name: Check formatting
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "::error::The following files are not formatted:"
          gofmt -s -l .
          echo "Run 'gofmt -s -w .' to fix formatting issues"
          exit 1
        fi
        echo "All Go files are properly formatted"

    - name: Run go vet
      run: go vet ./...

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m

  # Job 3: Protocol Buffer Linting and Breaking Change Detection.
  # No `needs:` — runs in parallel with build/lint/security.
  # Pure buf-action — no Nix needed.
  proto-check:
    name: Protocol Buffer Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install buf
      uses: bufbuild/buf-action@v1
      with:
        # setup_only stops the action from running its default
        # buf build + buf push (which fail for v1 buf.work.yaml).
        setup_only: true
        version: ${{ env.BUF_VERSION }}

    - name: Lint Protocol Buffers
      run: buf lint

    - name: Check for breaking changes
      if: github.event_name == 'pull_request'
      run: |
        buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=${{ github.base_ref }}'

  # Job 4: Security Scanning.
  # Gosec runs on every push/PR. Trivy (slow vuln-DB pull) moved to a
  # nightly workflow in security-nightly.yaml.
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Run Gosec Security Scanner
      uses: securego/gosec@master
      with:
        # Exclude generated proto code and SQLC output from scanning.
        # These are vendored/generated and produce noise without value.
        args: '-no-fail -fmt sarif -exclude-generated -exclude-dir=internal/proto/gen -exclude-dir=internal/db/sqlc -out gosec-results.sarif ./...'

    - name: Upload Gosec scan results to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'gosec-results.sarif'

  # Job 5: Integration Tests with Docker (testcontainers).
  # No Nix here — we only need Go, the cached protos, and Docker.
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Install buf
      uses: bufbuild/buf-action@v1
      with:
        # setup_only stops the action from running its default
        # buf build + buf push (which fail for v1 buf.work.yaml).
        setup_only: true
        version: ${{ env.BUF_VERSION }}

    - name: Cache generated protobuf files
      uses: actions/cache@v4
      id: proto-cache
      with:
        path: internal/proto/gen
        key: ${{ runner.os }}-proto-${{ hashFiles('internal/proto/**/*.proto', 'buf.gen.yaml', 'buf.work.yaml', 'internal/proto/buf.yaml') }}
        restore-keys: |
          ${{ runner.os }}-proto-

    - name: Generate Protocol Buffers
      if: steps.proto-cache.outputs.cache-hit != 'true'
      run: |
        rm -rf internal/proto/gen
        buf generate

    - name: Verify generated files exist
      run: |
        if [ ! -d "internal/proto/gen" ] || [ -z "$(ls -A internal/proto/gen)" ]; then
          echo "::error::No protocol buffer files were generated"
          exit 1
        fi
        echo "Generated $(find internal/proto/gen -name '*.go' | wc -l) Go files"

    - name: Run Integration Tests
      env:
        TESTCONTAINERS_RYUK_DISABLED: "true"
        DOCKER_HOST: unix:///var/run/docker.sock
      run: |
        go test -tags=integration -race -timeout=10m -count=1 ./internal/... 2>&1 | tee integration-test-results.txt

    - name: Upload Integration Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results
        path: integration-test-results.txt
