name: CI Pipeline

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read
  security-events: write  # Required for uploading SARIF results

env:
  GO_VERSION: '1.24'
  BUF_VERSION: '1.49.0'

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Build and unit tests.
  # This is the critical path — everything else can fan out from it.
  # No Nix here: setup-go + buf-action give us everything we need in <30s.
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Install buf
      uses: bufbuild/buf-action@v1
      with:
        # setup_only stops the action from running its default
        # buf build + buf push (which fail for v1 buf.work.yaml).
        setup_only: true
        version: ${{ env.BUF_VERSION }}

    - name: Cache generated protobuf files
      uses: actions/cache@v4
      id: proto-cache
      with:
        path: internal/proto/gen
        key: ${{ runner.os }}-proto-${{ hashFiles('internal/proto/**/*.proto', 'buf.gen.yaml', 'buf.work.yaml', 'internal/proto/buf.yaml') }}
        restore-keys: |
          ${{ runner.os }}-proto-

    - name: Generate Protocol Buffers
      if: steps.proto-cache.outputs.cache-hit != 'true'
      run: |
        rm -rf internal/proto/gen
        buf generate

    - name: Verify generated files exist
      run: |
        if [ ! -d "internal/proto/gen" ] || [ -z "$(ls -A internal/proto/gen)" ]; then
          echo "::error::No protocol buffer files were generated"
          exit 1
        fi
        echo "Generated $(find internal/proto/gen -name '*.go' | wc -l) Go files"

    - name: Build application
      run: go build -o bin/immich-go-backend ./cmd

    - name: Run unit tests
      # Race + integration build tag live in the integration-tests job
      # so this stays fast (~30s on a warm cache).
      run: go test -short -count=1 -timeout=5m ./...

    - name: Upload coverage to Codecov
      continue-on-error: true
      uses: codecov/codecov-action@v5
      with:
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}

  # Job 2: Code Quality and Linting.
  # Runs in parallel with build. No Nix; uses buf-action and setup-go.
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Install buf
      uses: bufbuild/buf-action@v1
      with:
        # setup_only stops the action from running its default
        # buf build + buf push (which fail for v1 buf.work.yaml).
        setup_only: true
        version: ${{ env.BUF_VERSION }}

    - name: Cache generated protobuf files
      uses: actions/cache@v4
      id: proto-cache
      with:
        path: internal/proto/gen
        key: ${{ runner.os }}-proto-${{ hashFiles('internal/proto/**/*.proto', 'buf.gen.yaml', 'buf.work.yaml', 'internal/proto/buf.yaml') }}
        restore-keys: |
          ${{ runner.os }}-proto-

    - name: Generate Protocol Buffers
      if: steps.proto-cache.outputs.cache-hit != 'true'
      run: |
        rm -rf internal/proto/gen
        buf generate

    - name: Check formatting
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "::error::The following files are not formatted:"
          gofmt -s -l .
          echo "Run 'gofmt -s -w .' to fix formatting issues"
          exit 1
        fi
        echo "All Go files are properly formatted"

    - name: Run go vet
      run: go vet ./...

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m

  # Job 3: Protocol Buffer Linting and Breaking Change Detection.
  # No `needs:` — runs in parallel with build/lint/security.
  # Pure buf-action — no Nix needed.
  proto-check:
    name: Protocol Buffer Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install buf
      uses: bufbuild/buf-action@v1
      with:
        # setup_only stops the action from running its default
        # buf build + buf push (which fail for v1 buf.work.yaml).
        setup_only: true
        version: ${{ env.BUF_VERSION }}

    - name: Lint Protocol Buffers
      run: buf lint

    - name: Check for breaking changes
      if: github.event_name == 'pull_request'
      run: |
        buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=${{ github.base_ref }}'

  # Job 4: Security Scanning.
  # Gosec runs on every push/PR. Trivy (slow vuln-DB pull) moved to a
  # nightly workflow in security-nightly.yaml.
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Run Gosec Security Scanner
      uses: securego/gosec@master
      with:
        # Exclude generated proto code and SQLC output from scanning.
        # These are vendored/generated and produce noise without value.
        args: '-no-fail -fmt sarif -exclude-generated -exclude-dir=internal/proto/gen -exclude-dir=internal/db/sqlc -out gosec-results.sarif ./...'

    - name: Upload Gosec scan results to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'gosec-results.sarif'

  # Job 5: Integration Tests with Docker (testcontainers).
  # No Nix here — we only need Go, the cached protos, and Docker.
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Install buf
      uses: bufbuild/buf-action@v1
      with:
        # setup_only stops the action from running its default
        # buf build + buf push (which fail for v1 buf.work.yaml).
        setup_only: true
        version: ${{ env.BUF_VERSION }}

    - name: Cache generated protobuf files
      uses: actions/cache@v4
      id: proto-cache
      with:
        path: internal/proto/gen
        key: ${{ runner.os }}-proto-${{ hashFiles('internal/proto/**/*.proto', 'buf.gen.yaml', 'buf.work.yaml', 'internal/proto/buf.yaml') }}
        restore-keys: |
          ${{ runner.os }}-proto-

    - name: Generate Protocol Buffers
      if: steps.proto-cache.outputs.cache-hit != 'true'
      run: |
        rm -rf internal/proto/gen
        buf generate

    - name: Verify generated files exist
      run: |
        if [ ! -d "internal/proto/gen" ] || [ -z "$(ls -A internal/proto/gen)" ]; then
          echo "::error::No protocol buffer files were generated"
          exit 1
        fi
        echo "Generated $(find internal/proto/gen -name '*.go' | wc -l) Go files"

    - name: Run Integration Tests
      env:
        TESTCONTAINERS_RYUK_DISABLED: "true"
        DOCKER_HOST: unix:///var/run/docker.sock
      run: |
        go test -tags=integration -race -timeout=10m -count=1 ./internal/... 2>&1 | tee integration-test-results.txt

    - name: Upload Integration Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results
        path: integration-test-results.txt

  # Job 6: Browser E2E against the upstream Immich frontend.
  # This starts our backend and runs Immich's real web app in dev/proxy mode
  # with IMMICH_SERVER_URL pointed at the Go backend.
  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
    - name: Checkout backend
      uses: actions/checkout@v4

    - name: Checkout upstream Immich
      uses: actions/checkout@v4
      with:
        repository: immich-app/immich
        ref: v2.7.5
        path: immich-upstream

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Install buf
      uses: bufbuild/buf-action@v1
      with:
        setup_only: true
        version: ${{ env.BUF_VERSION }}

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '24.14.0'

    - name: Enable pnpm
      run: |
        corepack enable pnpm
        corepack prepare pnpm@10.33.2 --activate
        pnpm --version

    - name: Cache generated protobuf files
      uses: actions/cache@v4
      id: proto-cache
      with:
        path: internal/proto/gen
        key: ${{ runner.os }}-proto-${{ hashFiles('internal/proto/**/*.proto', 'buf.gen.yaml', 'buf.work.yaml', 'internal/proto/buf.yaml') }}
        restore-keys: |
          ${{ runner.os }}-proto-

    - name: Generate Protocol Buffers
      if: steps.proto-cache.outputs.cache-hit != 'true'
      run: |
        rm -rf internal/proto/gen
        buf generate

    - name: Build backend
      run: go build -o bin/immich-go-backend ./cmd

    - name: Start dependencies
      run: |
        docker run -d --name e2e-postgres \
          -e POSTGRES_DB=immich \
          -e POSTGRES_USER=immich \
          -e POSTGRES_PASSWORD=immich \
          -p 5432:5432 \
          docker.io/tensorchord/pgvecto-rs:pg17-v0.4.0
        docker run -d --name e2e-redis -p 6379:6379 redis:7-alpine

        for i in {1..60}; do
          if docker exec e2e-postgres pg_isready -U immich -d immich >/dev/null 2>&1; then
            break
          fi
          sleep 1
        done

        docker exec e2e-postgres psql -U immich -d immich -v ON_ERROR_STOP=1 <<'SQL'
        CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
        CREATE EXTENSION IF NOT EXISTS "vectors";
        CREATE EXTENSION IF NOT EXISTS "cube";
        CREATE EXTENSION IF NOT EXISTS "earthdistance";
        CREATE EXTENSION IF NOT EXISTS "pg_trgm";
        CREATE EXTENSION IF NOT EXISTS "unaccent";
        SQL

        for i in {1..30}; do
          if docker exec e2e-redis redis-cli ping >/dev/null 2>&1; then
            exit 0
          fi
          sleep 1
        done
        echo "::error::Redis did not become ready"
        exit 1

    - name: Configure backend
      run: |
        cat > e2e-config.yaml <<'YAML'
        server:
          address: "127.0.0.1:3001"
          grpc_address: "127.0.0.1:3002"
          read_timeout: 30s
          write_timeout: 30s
          shutdown_timeout: 10s

        database:
          url: "postgres://immich:immich@127.0.0.1:5432/immich?sslmode=disable"
          max_open_conns: 10
          max_idle_conns: 5
          max_conn_lifetime: 1h

        logging:
          level: "info"
          format: "json"
          output: "stdout"

        auth:
          jwt_secret: "e2e-test-secret-key-with-at-least-32-bytes"
          jwt_expiry: "24h"
          jwt_refresh_expiry: "168h"
          jwt_issuer: "immich-go-backend-e2e"
          registration_enabled: true
          login_rate_limit: 20
          login_rate_window: "1m"

        storage:
          backend: "local"
          local:
            root_path: "./e2e-uploads"
            file_mode: "0644"
            dir_mode: "0755"
          upload:
            max_file_size: 104857600
            allowed_extensions: [".jpg", ".jpeg", ".png", ".webp", ".mp4"]
            allowed_mime_types: ["image/jpeg", "image/png", "image/webp", "video/mp4"]

        jobs:
          enabled: false
          redis_url: "redis://127.0.0.1:6379/0"

        redis:
          host: "127.0.0.1"
          port: 6379
          db: 0
        YAML

    - name: Start backend
      run: |
        ./bin/immich-go-backend --config e2e-config.yaml migrate
        ./bin/immich-go-backend --config e2e-config.yaml serve > backend-e2e.log 2>&1 &
        echo $! > backend-e2e.pid

        for i in {1..60}; do
          if curl -fsS http://127.0.0.1:3001/api/server/about >/dev/null; then
            exit 0
          fi
          sleep 1
        done
        echo "::error::Backend did not become ready"
        cat backend-e2e.log
        exit 1

    - name: Install upstream frontend dependencies
      run: |
        pnpm --dir immich-upstream \
          --filter @immich/sdk \
          --filter immich-web \
          install \
          --frozen-lockfile

    - name: Start upstream frontend
      run: |
        (
          cd immich-upstream
          IMMICH_SERVER_URL=http://127.0.0.1:3001 pnpm --filter immich-web dev
        ) > immich-web-e2e.log 2>&1 &
        echo $! > immich-web-e2e.pid

        for i in {1..90}; do
          if curl -fsS http://127.0.0.1:3000 >/dev/null; then
            exit 0
          fi
          sleep 1
        done
        echo "::error::Upstream frontend did not become ready"
        cat immich-web-e2e.log
        exit 1

    - name: Install E2E dependencies
      run: |
        pnpm --dir e2e install --frozen-lockfile
        pnpm --dir e2e exec playwright install --with-deps chromium

    - name: Run frontend E2E tests
      env:
        IMMICH_WEB_URL: http://127.0.0.1:3000
      run: pnpm --dir e2e test

    - name: Upload E2E artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: frontend-e2e-artifacts
        path: |
          backend-e2e.log
          immich-web-e2e.log
          e2e/playwright-report
          e2e/test-results

    - name: Stop E2E services
      if: always()
      run: |
        if [ -f backend-e2e.pid ]; then kill "$(cat backend-e2e.pid)" || true; fi
        if [ -f immich-web-e2e.pid ]; then kill "$(cat immich-web-e2e.pid)" || true; fi
        docker rm -f e2e-postgres e2e-redis || true
