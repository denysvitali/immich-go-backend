version: "2"
linters:
  enable:
    - copyloopvar
    - dogsled
    - gocritic
    - gosec
    - misspell
    - nakedret
    - unconvert
  disable:
    - dupl
    - unparam
  settings:
    errcheck:
      exclude-functions:
        - fmt.Printf
        - fmt.Println
        - fmt.Sprintf
    gosec:
      excludes:
        - G115
    govet:
      disable:
        - shadow
    staticcheck:
      checks:
        - all
        - -SA9003
        - -ST1003
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
          - govet
          - ineffassign
          - staticcheck
          - unused
        path: internal/proto/gen/
      - linters:
          - all
        path: .*\.pb\.go
      - linters:
          - all
        path: .*\.pb\.gw\.go
      - linters:
          - gosec
        path: internal/(config|oauth)/
        text: "G101:"
    paths:
      - internal/proto/gen
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - internal/proto/gen
      - third_party$
      - builtin$
      - examples$
