# Immich Go Backend Configuration
server:
  address: "0.0.0.0:3001"
  grpc_address: "0.0.0.0:3002"
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 10s

database:
  url: "postgres://immich:immich@localhost:5432/immich?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 10
  max_conn_lifetime: 1h
  connect_timeout: 30s

logging:
  level: "info"
  format: "json"
  output: "stdout"

auth:
  jwt_secret: "your-super-secret-jwt-key-change-this-in-production"
  jwt_expiry: "24h"
  jwt_refresh_expiry: "168h"
  jwt_issuer: "immich-go-backend"
  registration_enabled: true

storage:
  upload_location: "./uploads"
  library_location: "./library"
  thumbs_location: "./thumbs"
  profile_location: "./profile"
  video_location: "./encoded-video"

features:
  # ML feature flags are off by default. Flip these (and machine_learning.enabled)
  # once an Immich ML container is reachable.
  machine_learning_enabled: false
  face_recognition_enabled: false
  clip_search_enabled: false
  object_detection_enabled: false
  duplicate_detection_enabled: false
  video_transcoding_enabled: false
  thumbnail_generation_enabled: true
  exif_extraction_enabled: true

mail:
  enabled: false
  smtp:
    host: ""
    port: 587
    username: ""
    password: ""
    from: "noreply@immich.app"

external:
  domain: ""
  login_page_message: ""

jobs:
  enabled: true
  redis_url: "redis://localhost:6379/0"
  workers: 4
  concurrency: 10
  queue_name: "immich"
  retry_max_retries: 10
  
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  
# Immich ML service (https://docs.immich.app). Off by default.
machine_learning:
  enabled: false
  url: "http://localhost:3003"
  timeout: 60s
  clip:
    enabled: true
    model_name: "ViT-B-32__openai"
    max_distance: 0.6
  facial_recognition:
    enabled: true
    model_name: "buffalo_l"
    min_score: 0.7
    max_distance: 0.5
    min_faces: 3
  duplicate_detection:
    enabled: true
    max_distance: 0.01
