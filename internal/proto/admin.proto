syntax = "proto3";

package immich.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "common.proto";
import "preferences.proto";
import "system_config.proto";

option go_package = "github.com/denysvitali/immich-go-backend/gen/immich/v1;immichv1";

// Admin service for administrative operations
service AdminService {
  // Send notification
  rpc SendNotification(SendNotificationRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/notifications"
      body: "*"
    };
  }

  // Render notification template
  rpc RenderNotificationTemplate(RenderNotificationTemplateRequest) returns (TemplateResponseDto) {
    option (google.api.http) = {
      post: "/api/admin/notifications/templates/{name}"
      body: "*"
    };
  }

  // Test email notification
  rpc TestEmailNotification(TestEmailNotificationRequest) returns (TestEmailResponseDto) {
    option (google.api.http) = {
      post: "/api/admin/notifications/test-email"
      body: "*"
    };
  }

  // Get integrity report by type
  rpc GetIntegrityReport(GetIntegrityReportRequest) returns (IntegrityReportResponseDto) {
    option (google.api.http) = {
      get: "/api/admin/integrity/report"
    };
  }

  // Delete integrity report item
  rpc DeleteIntegrityReport(DeleteIntegrityReportRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/admin/integrity/report/{id}"
    };
  }

  // Download flagged file
  rpc GetIntegrityReportFile(GetIntegrityReportFileRequest) returns (IntegrityReportFileResponse) {
    option (google.api.http) = {
      get: "/api/admin/integrity/report/{id}/file"
    };
  }

  // Export integrity report by type as CSV
  rpc GetIntegrityReportCsv(GetIntegrityReportCsvRequest) returns (IntegrityReportFileResponse) {
    option (google.api.http) = {
      get: "/api/admin/integrity/report/{type}/csv"
    };
  }

  // Get integrity report summary
  rpc GetIntegrityReportSummary(google.protobuf.Empty) returns (IntegrityReportSummaryResponseDto) {
    option (google.api.http) = {
      get: "/api/admin/integrity/summary"
    };
  }

  // Search users (admin)
  rpc SearchUsersAdmin(SearchUsersAdminRequest) returns (SearchUsersAdminResponse) {
    option (google.api.http) = {
      get: "/api/admin/users"
    };
  }

  // Create user (admin)
  rpc CreateUserAdmin(CreateUserAdminRequest) returns (UserAdminResponseDto) {
    option (google.api.http) = {
      post: "/api/admin/users"
      body: "*"
    };
  }

  // Delete user (admin)
  rpc DeleteUserAdmin(DeleteUserAdminRequest) returns (UserAdminResponseDto) {
    option (google.api.http) = {
      delete: "/api/admin/users/{id}"
    };
  }

  // Get user (admin)
  rpc GetUserAdmin(GetUserAdminRequest) returns (UserAdminResponseDto) {
    option (google.api.http) = {
      get: "/api/admin/users/{id}"
    };
  }

  // Update user (admin)
  rpc UpdateUserAdmin(UpdateUserAdminRequest) returns (UserAdminResponseDto) {
    option (google.api.http) = {
      put: "/api/admin/users/{id}"
      body: "*"
    };
  }

  // Get user preferences (admin)
  rpc GetUserPreferencesAdmin(GetUserPreferencesAdminRequest) returns (UserPreferencesResponseDto) {
    option (google.api.http) = {
      get: "/api/admin/users/{user_id}/preferences"
    };
  }

  // Update user preferences (admin)
  rpc UpdateUserPreferencesAdmin(UpdateUserPreferencesAdminRequest) returns (UserPreferencesResponseDto) {
    option (google.api.http) = {
      put: "/api/admin/users/{user_id}/preferences"
      body: "*"
    };
  }

  // Restore user (admin)
  rpc RestoreUserAdmin(RestoreUserAdminRequest) returns (UserAdminResponseDto) {
    option (google.api.http) = {
      post: "/api/admin/users/{id}/restore"
      body: "*"
    };
  }

  // Get user statistics (admin)
  rpc GetUserStatisticsAdmin(GetUserStatisticsAdminRequest) returns (UserStatisticsResponseDto) {
    option (google.api.http) = {
      get: "/api/admin/users/{id}/statistics"
    };
  }

  // Get user calendar heatmap (admin)
  rpc GetUserCalendarHeatmapAdmin(GetUserCalendarHeatmapAdminRequest) returns (CalendarHeatmapResponseDto) {
    option (google.api.http) = {
      get: "/api/admin/users/{id}/calendar-heatmap"
    };
  }

  // Get user sessions (admin)
  rpc GetUserSessionsAdmin(GetUserSessionsAdminRequest) returns (GetUserSessionsAdminResponse) {
    option (google.api.http) = {
      get: "/api/admin/users/{id}/sessions"
    };
  }

  // Delete user session (admin)
  rpc DeleteUserSessionAdmin(DeleteUserSessionAdminRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/admin/users/{user_id}/sessions/{session_id}"
    };
  }

  // Unlink all OAuth accounts (admin)
  rpc UnlinkAllOAuthAccounts(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/auth/unlink-all"
      body: "*"
    };
  }

  // List database backups
  rpc ListDatabaseBackups(google.protobuf.Empty) returns (DatabaseBackupListResponseDto) {
    option (google.api.http) = {
      get: "/api/admin/database-backups"
    };
  }

  // Delete database backups
  rpc DeleteDatabaseBackup(DatabaseBackupDeleteDto) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/admin/database-backups"
      body: "*"
    };
  }

  // Start database restore flow
  rpc StartDatabaseRestoreFlow(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/database-backups/start-restore"
      body: "*"
    };
  }

  // Upload a database backup
  rpc UploadDatabaseBackup(DatabaseBackupUploadDto) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/database-backups/upload"
      body: "*"
    };
  }

  // Download a database backup
  rpc DownloadDatabaseBackup(DownloadDatabaseBackupRequest) returns (DownloadDatabaseBackupResponse) {
    option (google.api.http) = {
      get: "/api/admin/database-backups/{filename}"
    };
  }

  // Detect prior install artifacts in storage folders
  rpc DetectPriorInstall(google.protobuf.Empty) returns (MaintenanceDetectInstallResponseDto) {
    option (google.api.http) = {
      get: "/api/admin/maintenance/detect-install"
    };
  }

  // List dead-letter jobs
  rpc ListDeadLetterJobs(google.protobuf.Empty) returns (DeadLetterJobListResponseDto) {
    option (google.api.http) = {
      get: "/api/admin/jobs/dead-letter"
    };
  }

  // Retry a dead-letter job
  rpc RetryDeadLetterJob(RetryDeadLetterJobRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/jobs/dead-letter/{id}/retry"
      body: "*"
    };
  }
}

// Template response DTO
message TemplateResponseDto {
  string html = 1;
  string name = 2;
}

// Test email response DTO
message TestEmailResponseDto {
  string message_id = 1;
}

// User admin response DTO
message UserAdminResponseDto {
  UserAvatarColor avatar_color = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp deleted_at = 3;
  string email = 4;
  string id = 5;
  bool is_admin = 6;
  string name = 7;
  string oauth_id = 8;
  string profile_image_path = 9;
  google.protobuf.Timestamp profile_changed_at = 10;
  int64 quota_size_in_bytes = 11;
  bool should_change_password = 12;
  string storage_label = 13;
  google.protobuf.Timestamp updated_at = 14;
}

// User preferences response DTO
message UserPreferencesResponseDto {
  AvatarResponse avatar = 1;
  UserDownloadPreferencesResponse download = 2;
  EmailNotificationsResponse email_notifications = 3;
  MemoriesResponse memories = 4;
  PurchaseResponse purchase = 5;
}

// User statistics response DTO
message UserStatisticsResponseDto {
  int32 photos = 1;
  int64 usage = 2;
  int32 videos = 3;
}

// Avatar response
message AvatarResponse {
  UserAvatarColor color = 1;
}

// Send notification request
message SendNotificationRequest {
  string message = 1;
  string subject = 2;
  repeated string user_ids = 3;
}

// Render notification template request
message RenderNotificationTemplateRequest {
  string name = 1;
  string template = 2;
}

// Test email notification request
message TestEmailNotificationRequest {
  SystemConfigNotificationsSmtpDto smtp = 1;
  string template = 2;
}

// Integrity report request
message GetIntegrityReportRequest {
  optional string cursor = 1;
  optional int64 limit = 2;
  string type = 3;
}

// Delete integrity report item request
message DeleteIntegrityReportRequest {
  string id = 1;
}

// Download flagged file request
message GetIntegrityReportFileRequest {
  string id = 1;
}

// Export integrity report CSV request
message GetIntegrityReportCsvRequest {
  string type = 1;
}

// Integrity report item
message IntegrityReportItemDto {
  string id = 1;
  string type = 2;
  string path = 3;
}

// Integrity report response
message IntegrityReportResponseDto {
  repeated IntegrityReportItemDto items = 1;
  optional string next_cursor = 2;
}

// Integrity report summary response
message IntegrityReportSummaryResponseDto {
  int64 checksum_mismatch = 1;
  int64 missing_file = 2;
  int64 untracked_file = 3;
}

// Binary integrity report response
message IntegrityReportFileResponse {
  bytes data = 1;
  string content_type = 2;
  string filename = 3;
}

// Search users admin request
message SearchUsersAdminRequest {
  optional string email = 1;
  optional string name = 2;
  optional bool with_deleted = 3;
}

// Search users admin response (wrapper for array)
message SearchUsersAdminResponse {
  repeated UserAdminResponseDto users = 1;
}

// Create user admin request
message CreateUserAdminRequest {
  string email = 1;
  string name = 2;
  string password = 3;
  optional int64 quota_size_in_bytes = 4;
  optional bool should_change_password = 5;
  optional string storage_label = 6;
}

// Delete user admin request
message DeleteUserAdminRequest {
  string id = 1;
  optional bool force = 2;
}

// Get user admin request
message GetUserAdminRequest {
  string id = 1;
}

// Update user admin request
message UpdateUserAdminRequest {
  string id = 1;
  optional UserAvatarColor avatar_color = 2;
  optional string email = 3;
  optional bool is_admin = 4;
  optional string name = 5;
  optional string password = 6;
  optional int64 quota_size_in_bytes = 7;
  optional bool should_change_password = 8;
  optional string storage_label = 9;
}

// Get user preferences admin request
message GetUserPreferencesAdminRequest {
  string user_id = 1;
}

// Update user preferences admin request
message UpdateUserPreferencesAdminRequest {
  string user_id = 1;
  UserPreferencesResponseDto preferences = 2;
}

// Restore user admin request
message RestoreUserAdminRequest {
  string id = 1;
}

// Get user statistics admin request
message GetUserStatisticsAdminRequest {
  string id = 1;
}

// Get user calendar heatmap admin request
message GetUserCalendarHeatmapAdminRequest {
  string id = 1;
  string from = 2;
  string to = 3;
  string type = 4;
}

message DatabaseBackupDto {
  string filename = 1;
  int64 filesize = 2;
  string timezone = 3;
}

message DatabaseBackupListResponseDto {
  repeated DatabaseBackupDto backups = 1;
}

message DatabaseBackupDeleteDto {
  repeated string backups = 1;
}

message DatabaseBackupUploadDto {
  string filename = 1;
  bytes data = 2;
}

message DownloadDatabaseBackupRequest {
  string filename = 1;
}

message DownloadDatabaseBackupResponse {
  bytes data = 1;
  string content_type = 2;
  string filename = 3;
}

enum StorageFolder {
  STORAGE_FOLDER_UNSPECIFIED = 0;
  STORAGE_FOLDER_ENCODED_VIDEO = 1;
  STORAGE_FOLDER_LIBRARY = 2;
  STORAGE_FOLDER_UPLOAD = 3;
  STORAGE_FOLDER_PROFILE = 4;
  STORAGE_FOLDER_THUMBS = 5;
  STORAGE_FOLDER_BACKUPS = 6;
}

message MaintenanceDetectInstallStorageFolderDto {
  StorageFolder folder = 1;
  int64 files = 2;
  bool readable = 3;
  bool writable = 4;
}

message MaintenanceDetectInstallResponseDto {
  repeated MaintenanceDetectInstallStorageFolderDto storage = 1;
}

// Get user sessions admin request
message GetUserSessionsAdminRequest {
  string id = 1;
}

// Get user sessions admin response
message GetUserSessionsAdminResponse {
  repeated SessionResponseDto sessions = 1;
}

// Session response DTO
message SessionResponseDto {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  string device_type = 4;
  string device_os = 5;
  bool current = 6;
}

// Delete user session admin request
message DeleteUserSessionAdminRequest {
  string user_id = 1;
  string session_id = 2;
}

// Dead-letter job representation
message DeadLetterJobDto {
  string id = 1;
  string queue = 2;
  string job_type = 3;
  bytes payload = 4;
  string error = 5;
  int32 max_retries = 6;
  int32 retried_count = 7;
  google.protobuf.Timestamp failed_at = 8;
  google.protobuf.Timestamp last_failed_at = 9;
}

// List dead-letter jobs response
message DeadLetterJobListResponseDto {
  repeated DeadLetterJobDto jobs = 1;
}

// Retry dead-letter job request
message RetryDeadLetterJobRequest {
  string id = 1;
}
